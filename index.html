<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Domaine équestre — Illiat · Maquette 3D v14</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600&family=Spectral:wght@500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#cdd8e6;font-family:'Barlow Condensed',system-ui,sans-serif;}
  #app{position:fixed;inset:0;touch-action:none;} canvas{display:block;touch-action:none;}
  .ui{position:fixed;pointer-events:none;color:#26241f;}
  #title{left:22px;top:18px;}
  #title h1{font-family:'Spectral',serif;font-weight:500;font-size:26px;margin:0;color:#2b2a26;}
  #title p{margin:2px 0 0;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#5c5a52;}
  #legend{right:20px;top:18px;background:rgba(251,249,244,.86);backdrop-filter:blur(6px);
    border:1px solid #c9c2b0;border-radius:10px;padding:14px 16px;pointer-events:auto;min-width:200px;
    box-shadow:0 6px 24px rgba(0,0,0,.12);}
  #legend h2{margin:0 0 8px;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#8a7a5f;font-weight:600;}
  .row{display:flex;align-items:center;gap:9px;font-size:14px;margin:5px 0;color:#3a3831;}
  .sw{width:16px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.15);}
  #hint{left:0;right:0;bottom:16px;text-align:center;font-size:13px;letter-spacing:1px;color:#4a4840;}
  #hint span{background:rgba(251,249,244,.8);padding:5px 14px;border-radius:20px;border:1px solid #c9c2b0;}
  .btn{pointer-events:auto;cursor:pointer;border:none;border-radius:8px;padding:8px 14px;
    font-family:inherit;font-size:13px;letter-spacing:1px;text-transform:uppercase;}
  #controls{left:22px;bottom:16px;display:flex;gap:8px;}
  .btn.ghost{background:rgba(251,249,244,.9);color:#3a3831;border:1px solid #c9c2b0;}
  #legend h2{cursor:pointer;}
  #legend h2::after{content:' ▾';}
  #legend.folded h2::after{content:' ▸';}
  #legend.folded .row{display:none;}
  @media (max-width:640px){
    #title{left:14px;top:12px;}
    #title h1{font-size:20px;}
    #title p{font-size:11px;letter-spacing:1.5px;}
    #legend{right:12px;top:12px;min-width:0;padding:10px 12px;}
    #legend .row{font-size:12px;margin:4px 0;}
    #controls{left:12px;right:12px;bottom:12px;gap:6px;}
    .btn{padding:10px 10px;font-size:12px;flex:1;}
    #hint{display:none;}
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="ui" id="title"><h1>Domaine équestre</h1><p>ILLIAT (01) · V14</p></div>
<div class="ui" id="legend">
  <h2>Installations</h2>
  <div class="row"><span class="sw" style="background:#c9bfa9"></span>Manège couvert 66×25</div>
  <div class="row"><span class="sw" style="background:#b3946a"></span>Barn en U — écuries</div>
  <div class="row"><span class="sw" style="background:#e3d2ab"></span>Carrière 40×76</div>
  <div class="row"><span class="sw" style="background:#bcc98f"></span>Paddocks 2×5</div>
  <div class="row"><span class="sw" style="background:#b8a68a"></span>Marcheur rond</div>
  <div class="row"><span class="sw" style="background:#a8a8a8"></span>Parking poids lourd</div>
  <div class="row"><span class="sw" style="background:#fbfaf3"></span>Chemin d'accès + portail</div>
</div>
<div class="ui" id="controls">
  <button class="btn ghost" id="reset">Vue d'ensemble</button>
  <button class="btn ghost" id="top">Vue plan</button>
  <button class="btn ghost" id="carr">Vue carrière</button>
</div>
<div class="ui" id="hint"><span id="hintTxt">Glisser pour pivoter · molette pour zoomer · clic droit pour déplacer</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* Coordonnées "plan" en mètres, calées sur la vue aérienne (échelle : manège = 66 m) */
const CX=140, CY=140;
const M2=(x,y)=>[x-CX,-(y-CY)];

const scene=new THREE.Scene();
scene.background=new THREE.Color('#c6d4e4');
scene.fog=new THREE.Fog('#c6d4e4',260,720);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
document.getElementById('app').appendChild(renderer.domElement);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,1,2200);

scene.add(new THREE.HemisphereLight('#eaf1ff','#8a8462',0.85));
const sun=new THREE.DirectionalLight('#fff4e0',1.05);
sun.position.set(120,180,90);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
const d=240,sc=sun.shadow.camera;sc.left=-d;sc.right=d;sc.top=d;sc.bottom=-d;sc.near=10;sc.far=600;
sun.shadow.bias=-0.0004;scene.add(sun);
scene.add(new THREE.AmbientLight('#ffffff',0.18));

const ground=new THREE.Mesh(new THREE.PlaneGeometry(1600,1600),
  new THREE.MeshStandardMaterial({color:'#98a86a',roughness:1}));
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);

/* limite de propriété */
const BOUND=[[10,103],[200,108],[240,92],[289,76],[315,92],[322,135],[305,185],[295,228],[200,220],[120,222],[60,238],[14,170],[10,103]];
(()=>{const pts=BOUND.map(p=>{const[a,b]=M2(p[0],p[1]);return new THREE.Vector3(a,0.15,b);});
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
  new THREE.LineBasicMaterial({color:'#5b5a50'})));})();

function plane(x0,y0,x1,y1,color,y=0.06,rough=1){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(Math.abs(x1-x0),Math.abs(y1-y0)),
    new THREE.MeshStandardMaterial({color,roughness:rough}));
  m.rotation.x=-Math.PI/2;const[cx,cz]=M2((x0+x1)/2,(y0+y1)/2);
  m.position.set(cx,y,cz);m.receiveShadow=true;scene.add(m);return m;
}
function building(w,l,wallH,rh,wallColor,roofColor){
  const g=new THREE.Group();
  const walls=new THREE.Mesh(new THREE.BoxGeometry(w,wallH,l),
    new THREE.MeshStandardMaterial({color:wallColor,roughness:.85}));
  walls.position.y=wallH/2;walls.castShadow=true;walls.receiveShadow=true;g.add(walls);
  const sh=new THREE.Shape();sh.moveTo(-w/2,0);sh.lineTo(w/2,0);sh.lineTo(0,rh);
  const rg=new THREE.ExtrudeGeometry(sh,{depth:l,bevelEnabled:false});rg.translate(0,0,-l/2);
  const roof=new THREE.Mesh(rg,new THREE.MeshStandardMaterial({color:roofColor,roughness:.8}));
  roof.position.y=wallH;roof.castShadow=true;g.add(roof);return g;
}
function place(g,mx,my,rotY=0){const[x,z]=M2(mx,my);g.position.set(x,0,z);g.rotation.y=rotY;scene.add(g);}
function box(w,h,l,color,mx,my,y){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,l),
    new THREE.MeshStandardMaterial({color,roughness:.9}));
  const[x,z]=M2(mx,my);m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;scene.add(m);return m;
}
const railMat=new THREE.MeshStandardMaterial({color:'#8a7c63',roughness:.9});
function rail(a,b){
  const[x1,z1]=M2(a[0],a[1]),[x2,z2]=M2(b[0],b[1]);
  const dx=x2-x1,dz=z2-z1,len=Math.hypot(dx,dz),ang=Math.atan2(dz,dx);
  [0.6,1.1].forEach(h=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(len,0.09,0.09),railMat);
    m.position.set((x1+x2)/2,h,(z1+z2)/2);m.rotation.y=-ang;m.castShadow=true;scene.add(m);});
}
function tree(mx,my,s=1){
  const g=new THREE.Group();
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.35*s,0.5*s,3*s,6),
    new THREE.MeshStandardMaterial({color:'#6b543a',roughness:1}));
  tr.position.y=1.5*s;tr.castShadow=true;g.add(tr);
  const f=new THREE.Mesh(new THREE.SphereGeometry(2.4*s,10,8),
    new THREE.MeshStandardMaterial({color:'#5f7a3f',roughness:1}));
  f.position.y=4.4*s;f.castShadow=true;g.add(f);
  const f2=new THREE.Mesh(new THREE.SphereGeometry(1.7*s,10,8),
    new THREE.MeshStandardMaterial({color:'#728c4a',roughness:1}));
  f2.position.set(1.1*s,3.6*s,0.6*s);f2.castShadow=true;g.add(f2);
  const[x,z]=M2(mx,my);g.position.set(x,0,z);scene.add(g);
}
function sprite(text,mx,my,h,color='#2b2a26'){
  const c=document.createElement('canvas');c.width=512;c.height=128;
  const g=c.getContext('2d');
  let fs=58;g.font='600 '+fs+'px "Barlow Condensed",sans-serif';
  while(g.measureText(text).width>470&&fs>28){fs-=4;g.font='600 '+fs+'px "Barlow Condensed",sans-serif';}
  g.textAlign='center';g.textBaseline='middle';
  g.lineWidth=8;g.strokeStyle='rgba(251,249,244,.9)';g.strokeText(text,256,64);
  g.fillStyle=color;g.fillText(text,256,64);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),depthTest:false,transparent:true}));
  const[x,z]=M2(mx,my);s.position.set(x,h,z);s.scale.set(26,6.5,1);scene.add(s);
}
function ribbon(P,w,color,y){
  for(let i=0;i<P.length-1;i++){
    const[a1,b1]=M2(P[i][0],P[i][1]),[a2,b2]=M2(P[i+1][0],P[i+1][1]);
    const dx=a2-a1,dz=b2-b1,len=Math.hypot(dx,dz);
    const m=new THREE.Mesh(new THREE.PlaneGeometry(len+w*0.6,w),
      new THREE.MeshStandardMaterial({color,roughness:1}));
    m.rotation.x=-Math.PI/2;m.rotation.z=-Math.atan2(dz,dx);
    m.position.set((a1+a2)/2,y,(b1+b2)/2);m.receiveShadow=true;scene.add(m);
  }
}

/* ---- champs cultivés (hors pâture) ---- */
plane(0,0,345,100,'#d8cbb0',0.03);
plane(55,232,345,330,'#cfc0a2',0.03);

/* ---- route au nord-est (le long des bois) + chemin d'accès -> parking ---- */
ribbon([[345,45],[320,58],[300,70],[289,78],[276,90]],6,'#d8cfba',0.04);
const CHEMIN=[[289,78],[266,88],[243,100],[222,112],[206,121],[197,128],[190,135]];
ribbon(CHEMIN,9,'#b9b29c',0.09);
ribbon(CHEMIN,7,'#fbfaf3',0.13);
sprite("CHEMIN D'ACCÈS",240,96,5,'#4a4840');
box(6,1.6,0.4,'#3a352c',291,79,0.8);
sprite('PORTAIL',296,70,5,'#4a4840');

/* ---- piste au sud (existante) ---- */
ribbon([[0,262],[60,240],[130,227],[200,221],[280,222],[345,230]],5,'#d8cfba',0.04);
ribbon([[88,230],[100,223],[112,216]],4,'#d8cfba',0.05);

/* ---- parking poids lourd (est du manège) ---- */
plane(174,119,199,152,'#b5b5b5',0.05);
for(let i=0;i<3;i++){box(7,3.4,2.4,['#5a5a5a','#6f6f6f','#4a4a4a'][i],186,127+i*10,1.7);}
sprite('PARKING POIDS LOURD',187,146,6,'#4a4840');

/* ---- paddocks : 2 blocs de 5, à l'ouest ---- */
function paddockBlock(x0,y0,x1,y1,n){
  plane(x0,y0,x1,y1,'#b7c584',0.05);
  rail([x0,y0],[x1,y0]);rail([x1,y0],[x1,y1]);rail([x1,y1],[x0,y1]);rail([x0,y1],[x0,y0]);
  for(let i=1;i<n;i++){const yy=y0+(y1-y0)*i/n;rail([x0,yy],[x1,yy]);}
}
paddockBlock(13,109,48,164,5);
paddockBlock(58,109,93,164,5);
sprite('5 PADDOCKS',30,136,6,'#3f4a2c');
sprite('5 PADDOCKS',75,136,6,'#3f4a2c');

/* ---- haie existante entre paddocks et manège ---- */
box(1.5,2.5,60,'#5f7042',97,140,1.25);
[112,124,136,150,162].forEach(y=>tree(97,y,0.6));

/* ---- manège 66×25 sur le sable actuel ---- */
const man=building(25,66,7,4,'#c9bfa9','#b0a690');place(man,141,133.5,Math.PI/2);
sprite('MANÈGE',141,128,12);

/* ---- barn en U (ouverture au sud) + cour ---- */
const bMat='#b3946a',bRoof='#7f6642';
place(building(10,34,3.4,2.2,bMat,bRoof),118,157,Math.PI/2);
place(building(10,18,3.4,2.2,bMat,bRoof),106,171);
place(building(10,18,3.4,2.2,bMat,bRoof),130,171);
plane(111,162,125,182,'#cfc7b5',0.05);
[[114,167],[118,167],[122,167],[114,176],[122,176]].forEach((c,i)=>{
  const col=['#31506e','#7a2f2f','#e8e4da','#556b4d','#2f2f2f'][i%5];
  box(2,1.4,4.2,col,c[0],c[1],0.7);
});
sprite('ÉCURIES',118,153,8,'#3d2f1e');

/* ---- carrière 40×76 (nord-sud, à droite du barn) ---- */
plane(141,154,181,230,'#e3d2ab',0.08,1);
[[140,153,142,231],[180,153,182,231],[140,229,182,231],[140,153,155,155],[167,153,182,155]].forEach(h=>{
  box(Math.abs(h[2]-h[0]),1.7,Math.abs(h[3]-h[1]),'#59683d',(h[0]+h[2])/2,(h[1]+h[3])/2,0.85);
});
[[147,170],[163,184],[148,200],[164,212]].forEach(j=>{
  box(7,0.9,0.18,'#c65b34',j[0]+3.5,j[1],0.9);
  box(0.3,1.2,0.3,'#efe7d6',j[0],j[1],0.6);box(0.3,1.2,0.3,'#efe7d6',j[0]+7,j[1],0.6);
});
sprite('CARRIÈRE 40×76',161,192,4);

/* ---- marcheur rond (M) ---- */
(function(){
  const[dx,dz]=M2(126,196);
  const disc=new THREE.Mesh(new THREE.CircleGeometry(10,36),
    new THREE.MeshStandardMaterial({color:'#e0d0a8',roughness:1}));
  disc.rotation.x=-Math.PI/2;disc.position.set(dx,0.08,dz);disc.receiveShadow=true;scene.add(disc);
  [10,4].forEach(r=>{
    [0.6,1.1].forEach(h=>{
      const t=new THREE.Mesh(new THREE.TorusGeometry(r,0.06,6,48),railMat);
      t.rotation.x=Math.PI/2;t.position.set(dx,h,dz);scene.add(t);});
    for(let a=0;a<12;a++){
      const p=new THREE.Mesh(new THREE.BoxGeometry(0.14,1.3,0.14),railMat);
      p.position.set(dx+r*Math.cos(a/12*2*Math.PI),0.65,dz+r*Math.sin(a/12*2*Math.PI));
      p.castShadow=true;scene.add(p);}
  });
  const grey=new THREE.MeshStandardMaterial({color:'#6f6f6f',roughness:.8});
  const mast=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,3.4,8),grey);
  mast.position.set(dx,1.7,dz);mast.castShadow=true;scene.add(mast);
  for(let a=0;a<4;a++){
    const arm=new THREE.Mesh(new THREE.BoxGeometry(6.5,0.12,0.3),grey);
    arm.position.set(dx+3.4*Math.cos(a*Math.PI/2),3.1,dz+3.4*Math.sin(a*Math.PI/2));
    arm.rotation.y=-a*Math.PI/2;arm.castShadow=true;scene.add(arm);}
})();
sprite('MARCHEUR (M)',126,190,6,'#4a4840');

/* ---- bâtiments existants au sud ---- */
box(22,3.2,7,'#8a8378',126,213.5,1.6);
box(8,2.8,6,'#7d7668',94,218,1.4);

/* ---- arbres : grand bois au nord + lisière nord-est ---- */
for(let i=0;i<26;i++){tree(105+Math.random()*100,6+Math.random()*52,0.8+Math.random()*0.6);}
for(let i=0;i<14;i++){const t=i/13;tree(205+95*t+(Math.random()*8-4),56+38*t+(Math.random()*8-4),0.75+Math.random()*0.4);}
[[255,94],[232,108],[214,118]].forEach(p=>tree(p[0],p[1],0.6));
[[20,255],[150,233],[300,236],[50,100],[8,120],[310,140],[300,190]].forEach(p=>tree(p[0],p[1],0.7+Math.random()*0.3));

/* ---- caméra ---- */
const target=new THREE.Vector3(0,4,0);
let theta=-0.7,phi=0.95,radius=280;
const views={
  iso:{theta:-0.7,phi:0.95,radius:280,t:[0,4,0]},
  top:{theta:-0.0001,phi:0.02,radius:330,t:[0,4,0]},
  carr:{theta:-0.9,phi:0.85,radius:130,t:[21,3,-52]}
};
function applyCam(){
  phi=Math.max(0.02,Math.min(1.45,phi));radius=Math.max(60,Math.min(650,radius));
  camera.position.set(target.x+radius*Math.sin(phi)*Math.sin(theta),
    target.y+radius*Math.cos(phi),target.z+radius*Math.sin(phi)*Math.cos(theta));
  camera.lookAt(target);
}
function panCam(dx,dy){const pan=radius*0.0016;
  const right=new THREE.Vector3(Math.cos(theta),0,-Math.sin(theta));
  const fwd=new THREE.Vector3(Math.sin(theta),0,Math.cos(theta));
  target.addScaledVector(right,-dx*pan);target.addScaledVector(fwd,dy*pan);}
const pointers=new Map();let pinchDist=0;
renderer.domElement.addEventListener('pointerdown',e=>{
  try{renderer.domElement.setPointerCapture(e.pointerId);}catch(_){}
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY,button:e.button});
  if(pointers.size===2){const p=[...pointers.values()];pinchDist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);}
});
function endPointer(e){pointers.delete(e.pointerId);pinchDist=0;}
addEventListener('pointerup',endPointer);
addEventListener('pointercancel',endPointer);
addEventListener('pointermove',e=>{
  const prev=pointers.get(e.pointerId);if(!prev)return;
  const dx=e.clientX-prev.x,dy=e.clientY-prev.y;
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY,button:prev.button});
  if(pointers.size===1){
    if(prev.button===2)panCam(dx,dy);
    else{theta-=dx*0.005;phi-=dy*0.005;}
  }else if(pointers.size===2){
    const p=[...pointers.values()];
    const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    if(pinchDist>0&&d>0)radius*=pinchDist/d;
    pinchDist=d;
    panCam(dx/2,dy/2);
  }
  applyCam();
});
renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();radius*=(1+Math.sign(e.deltaY)*0.08);applyCam();},{passive:false});
renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
function tween(v){const s={theta,phi,radius,tx:target.x,ty:target.y,tz:target.z},t0=performance.now();
  (function a(){const k=Math.min(1,(performance.now()-t0)/650),e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
   theta=s.theta+(v.theta-s.theta)*e;phi=s.phi+(v.phi-s.phi)*e;radius=s.radius+(v.radius-s.radius)*e;
   target.set(s.tx+(v.t[0]-s.tx)*e,s.ty+(v.t[1]-s.ty)*e,s.tz+(v.t[2]-s.tz)*e);
   applyCam();if(k<1)requestAnimationFrame(a);})();}
document.getElementById('reset').onclick=()=>tween(views.iso);
document.getElementById('top').onclick=()=>tween(views.top);
document.getElementById('carr').onclick=()=>tween(views.carr);

if(matchMedia('(pointer:coarse)').matches)
  document.getElementById('hintTxt').textContent='1 doigt : pivoter · pincer : zoomer · 2 doigts : déplacer';
const leg=document.getElementById('legend');
leg.querySelector('h2').addEventListener('click',()=>leg.classList.toggle('folded'));
if(matchMedia('(pointer:coarse)').matches||innerWidth<=640)leg.classList.add('folded');
function resize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
addEventListener('resize',resize);resize();applyCam();
(function loop(){requestAnimationFrame(loop);renderer.render(scene,camera);})();
</script>
</body>
</html>
