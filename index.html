<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Domaine équestre — Illiat · Maquette 3D v14</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600&family=Spectral:wght@500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#cdd8e6;font-family:'Barlow Condensed',system-ui,sans-serif;}
  #app{position:fixed;inset:0;touch-action:none;} canvas{display:block;touch-action:none;}
  .ui{position:fixed;pointer-events:none;color:#26241f;}
  #title{left:22px;top:18px;}
  #title h1{font-family:'Spectral',serif;font-weight:500;font-size:26px;margin:0;color:#2b2a26;}
  #title p{margin:2px 0 0;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#5c5a52;}
  #legend{right:20px;top:18px;background:rgba(251,249,244,.86);backdrop-filter:blur(6px);
    border:1px solid #c9c2b0;border-radius:10px;padding:14px 16px;pointer-events:auto;min-width:200px;
    box-shadow:0 6px 24px rgba(0,0,0,.12);}
  #legend h2{margin:0 0 8px;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#8a7a5f;font-weight:600;}
  .row{display:flex;align-items:center;gap:9px;font-size:14px;margin:5px 0;color:#3a3831;}
  .sw{width:16px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.15);}
  #hint{left:0;right:0;bottom:16px;text-align:center;font-size:13px;letter-spacing:1px;color:#4a4840;}
  #hint span{background:rgba(251,249,244,.8);padding:5px 14px;border-radius:20px;border:1px solid #c9c2b0;}
  .btn{pointer-events:auto;cursor:pointer;border:none;border-radius:8px;padding:8px 14px;
    font-family:inherit;font-size:13px;letter-spacing:1px;text-transform:uppercase;}
  #controls{left:22px;bottom:16px;display:flex;gap:8px;}
  .btn.ghost{background:rgba(251,249,244,.9);color:#3a3831;border:1px solid #c9c2b0;}
  #editPanel{display:none;left:50%;transform:translateX(-50%);bottom:64px;background:rgba(251,249,244,.94);
    border:1px solid #c9c2b0;border-radius:12px;padding:10px 12px;pointer-events:auto;
    box-shadow:0 6px 24px rgba(0,0,0,.15);max-width:92vw;}
  #epName{font-weight:600;letter-spacing:2px;text-transform:uppercase;font-size:13px;color:#6b5c3e;margin:0 0 8px;text-align:center;}
  .ep-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .ep-grid .btn{padding:8px 6px;font-size:12px;}
  #epNo{display:none;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;font-size:13px;color:#4a4840;}
  #legend h2{cursor:pointer;}
  #legend h2::after{content:' ▾';}
  #legend.folded h2::after{content:' ▸';}
  #legend.folded .row{display:none;}
  @media (max-width:640px){
    #title{left:14px;top:12px;}
    #title h1{font-size:20px;}
    #title p{font-size:11px;letter-spacing:1.5px;}
    #legend{right:12px;top:12px;min-width:0;padding:10px 12px;}
    #legend .row{font-size:12px;margin:4px 0;}
    #controls{left:12px;right:12px;bottom:12px;gap:6px;}
    .btn{padding:10px 10px;font-size:12px;flex:1;}
    #hint{display:none;}
    #editPanel{bottom:70px;left:12px;right:12px;transform:none;max-width:none;}
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="ui" id="title"><h1>Domaine équestre</h1><p>ILLIAT (01) · V14</p></div>
<div class="ui" id="legend">
  <h2>Installations</h2>
  <div class="row"><span class="sw" style="background:#c9bfa9"></span>Manège couvert 66×25</div>
  <div class="row"><span class="sw" style="background:#b3946a"></span>Barn en U — écuries</div>
  <div class="row"><span class="sw" style="background:#e3d2ab"></span>Carrière</div>
  <div class="row"><span class="sw" style="background:#bcc98f"></span>Paddocks 2×5</div>
  <div class="row"><span class="sw" style="background:#b8a68a"></span>Marcheur rond</div>
  <div class="row"><span class="sw" style="background:#a8a8a8"></span>Parking poids lourd</div>
  <div class="row"><span class="sw" style="background:#f3ecdb"></span>Allée + portail</div>
</div>
<div class="ui" id="controls">
  <button class="btn ghost" id="reset">Vue d'ensemble</button>
  <button class="btn ghost" id="top">Vue plan</button>
  <button class="btn ghost" id="carr">Vue carrière</button>
  <button class="btn ghost" id="edit">✎ Éditer</button>
</div>
<div class="ui" id="editPanel">
  <div id="epNo">Touche un élément pour le modifier
    <button class="btn ghost" id="epShare">Partager ma version</button>
    <button class="btn ghost" id="epReset">Réinitialiser</button>
  </div>
  <div id="epSel">
    <div id="epName"></div>
    <div class="ep-grid">
      <button class="btn ghost" data-a="w-">Long −</button>
      <button class="btn ghost" data-a="w+">Long +</button>
      <button class="btn ghost" data-a="l-">Larg −</button>
      <button class="btn ghost" data-a="l+">Larg +</button>
      <button class="btn ghost" data-a="h-">Haut −</button>
      <button class="btn ghost" data-a="h+">Haut +</button>
      <button class="btn ghost" data-a="r+">⟲ 15°</button>
      <button class="btn ghost" data-a="x">✕ Fermer</button>
    </div>
  </div>
</div>
<div class="ui" id="hint"><span id="hintTxt">Glisser pour pivoter · molette pour zoomer · clic droit pour déplacer</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* Coordonnées "plan" en mètres, calées sur la vue aérienne (échelle : manège = 66 m) */
const CX=140, CY=140;
const M2=(x,y)=>[x-CX,y-CY];

const scene=new THREE.Scene();
scene.background=new THREE.Color('#c6d4e4');
scene.fog=new THREE.Fog('#c6d4e4',260,720);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
document.getElementById('app').appendChild(renderer.domElement);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,1,2200);

scene.add(new THREE.HemisphereLight('#eaf1ff','#8a8462',0.85));
const sun=new THREE.DirectionalLight('#fff4e0',1.05);
sun.position.set(120,180,90);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
const d=240,sc=sun.shadow.camera;sc.left=-d;sc.right=d;sc.top=d;sc.bottom=-d;sc.near=10;sc.far=600;
sun.shadow.bias=-0.0004;scene.add(sun);
scene.add(new THREE.AmbientLight('#ffffff',0.18));

const ground=new THREE.Mesh(new THREE.PlaneGeometry(1600,1600),
  new THREE.MeshStandardMaterial({color:'#98a86a',roughness:1}));
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);

/* limite de propriété */
const BOUND=[[10,103],[200,108],[240,92],[289,76],[315,92],[322,135],[305,185],[295,228],[200,220],[120,222],[60,238],[14,170],[10,103]];
(()=>{const pts=BOUND.map(p=>{const[a,b]=M2(p[0],p[1]);return new THREE.Vector3(a,0.15,b);});
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
  new THREE.LineBasicMaterial({color:'#5b5a50'})));})();

function plane(x0,y0,x1,y1,color,y=0.06,rough=1){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(Math.abs(x1-x0),Math.abs(y1-y0)),
    new THREE.MeshStandardMaterial({color,roughness:rough}));
  m.rotation.x=-Math.PI/2;const[cx,cz]=M2((x0+x1)/2,(y0+y1)/2);
  m.position.set(cx,y,cz);m.receiveShadow=true;scene.add(m);return m;
}
function building(w,l,wallH,rh,wallColor,roofColor){
  const g=new THREE.Group();
  const walls=new THREE.Mesh(new THREE.BoxGeometry(w,wallH,l),
    new THREE.MeshStandardMaterial({color:wallColor,roughness:.85}));
  walls.position.y=wallH/2;walls.castShadow=true;walls.receiveShadow=true;g.add(walls);
  const sh=new THREE.Shape();sh.moveTo(-w/2,0);sh.lineTo(w/2,0);sh.lineTo(0,rh);
  const rg=new THREE.ExtrudeGeometry(sh,{depth:l,bevelEnabled:false});rg.translate(0,0,-l/2);
  const roof=new THREE.Mesh(rg,new THREE.MeshStandardMaterial({color:roofColor,roughness:.8}));
  roof.position.y=wallH;roof.castShadow=true;g.add(roof);return g;
}
function place(g,mx,my,rotY=0){const[x,z]=M2(mx,my);g.position.set(x,0,z);g.rotation.y=rotY;scene.add(g);}
function box(w,h,l,color,mx,my,y){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,l),
    new THREE.MeshStandardMaterial({color,roughness:.9}));
  const[x,z]=M2(mx,my);m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;scene.add(m);return m;
}
const railMat=new THREE.MeshStandardMaterial({color:'#8a7c63',roughness:.9});
function rail(a,b){
  const[x1,z1]=M2(a[0],a[1]),[x2,z2]=M2(b[0],b[1]);
  const dx=x2-x1,dz=z2-z1,len=Math.hypot(dx,dz),ang=Math.atan2(dz,dx);
  [0.6,1.1].forEach(h=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(len,0.09,0.09),railMat);
    m.position.set((x1+x2)/2,h,(z1+z2)/2);m.rotation.y=-ang;m.castShadow=true;scene.add(m);});
}
function tree(mx,my,s=1){
  const g=new THREE.Group();
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.35*s,0.5*s,3*s,6),
    new THREE.MeshStandardMaterial({color:'#6b543a',roughness:1}));
  tr.position.y=1.5*s;tr.castShadow=true;g.add(tr);
  const f=new THREE.Mesh(new THREE.SphereGeometry(2.4*s,10,8),
    new THREE.MeshStandardMaterial({color:'#5f7a3f',roughness:1}));
  f.position.y=4.4*s;f.castShadow=true;g.add(f);
  const f2=new THREE.Mesh(new THREE.SphereGeometry(1.7*s,10,8),
    new THREE.MeshStandardMaterial({color:'#728c4a',roughness:1}));
  f2.position.set(1.1*s,3.6*s,0.6*s);f2.castShadow=true;g.add(f2);
  const[x,z]=M2(mx,my);g.position.set(x,0,z);scene.add(g);
}
function sprite(text,mx,my,h,color='#2b2a26'){
  const c=document.createElement('canvas');c.width=512;c.height=128;
  const g=c.getContext('2d');
  let fs=58;g.font='600 '+fs+'px "Barlow Condensed",sans-serif';
  while(g.measureText(text).width>470&&fs>28){fs-=4;g.font='600 '+fs+'px "Barlow Condensed",sans-serif';}
  g.textAlign='center';g.textBaseline='middle';
  g.lineWidth=8;g.strokeStyle='rgba(251,249,244,.9)';g.strokeText(text,256,64);
  g.fillStyle=color;g.fillText(text,256,64);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),depthTest:false,transparent:true}));
  const[x,z]=M2(mx,my);s.position.set(x,h,z);s.scale.set(26,6.5,1);scene.add(s);
}
function ribbon(P,w,color,y){
  for(let i=0;i<P.length-1;i++){
    const[a1,b1]=M2(P[i][0],P[i][1]),[a2,b2]=M2(P[i+1][0],P[i+1][1]);
    const dx=a2-a1,dz=b2-b1,len=Math.hypot(dx,dz);
    const m=new THREE.Mesh(new THREE.PlaneGeometry(len+w*0.6,w),
      new THREE.MeshStandardMaterial({color,roughness:1}));
    m.rotation.x=-Math.PI/2;m.rotation.z=-Math.atan2(dz,dx);
    m.position.set((a1+a2)/2,y,(b1+b2)/2);m.receiveShadow=true;scene.add(m);
  }
}

/* ---- champs cultivés (hors pâture) ---- */
plane(0,0,345,100,'#d8cbb0',0.03);
plane(55,232,345,330,'#cfc0a2',0.03);

/* ---- route au nord-est (le long des bois) + chemin d'accès -> parking ---- */
ribbon([[345,45],[320,58],[300,70],[289,78],[276,90]],6,'#d8cfba',0.04);
/* allée : courbe lissée, gravier bordé, lices blanches, arbres d'alignement */
const ALLEE=[[289,78],[280,82],[266,88],[243,100],[222,112],[206,121],[197,128],[190,135]];
const alleeCurve=new THREE.CatmullRomCurve3(ALLEE.map(p=>new THREE.Vector3(p[0],0,p[1])),false,'catmullrom',0.5);
const aPts=alleeCurve.getPoints(60).map(v=>[v.x,v.z]);
ribbon(aPts,10,'#b3aa92',0.08);
ribbon(aPts,8.4,'#a79d84',0.10);
ribbon(aPts,7,'#f3ecdb',0.13);
function offsetPts(P,o){
  const out=[];
  for(let i=0;i<P.length;i++){
    const a=P[Math.max(0,i-1)],b=P[Math.min(P.length-1,i+1)];
    const tx=b[0]-a[0],ty=b[1]-a[1],l=Math.hypot(tx,ty)||1;
    out.push([P[i][0]-ty/l*o,P[i][1]+tx/l*o]);
  }
  return out;
}
const fenceMat=new THREE.MeshStandardMaterial({color:'#eee8d8',roughness:.8});
function fence(P){
  for(let i=0;i<P.length;i++){
    const[x,z]=M2(P[i][0],P[i][1]);
    const post=new THREE.Mesh(new THREE.BoxGeometry(0.14,1.25,0.14),fenceMat);
    post.position.set(x,0.62,z);post.castShadow=true;scene.add(post);
    if(i<P.length-1){
      const[x2,z2]=M2(P[i+1][0],P[i+1][1]);
      const dx=x2-x,dz=z2-z,len=Math.hypot(dx,dz),fa=Math.atan2(dz,dx);
      [0.55,1.0].forEach(h=>{
        const r=new THREE.Mesh(new THREE.BoxGeometry(len,0.08,0.08),fenceMat);
        r.position.set((x+x2)/2,h,(z+z2)/2);r.rotation.y=-fa;r.castShadow=true;scene.add(r);
      });
    }
  }
}
fence(offsetPts(aPts,5.2).filter((_,i)=>i%3===0).slice(2,-2));
fence(offsetPts(aPts,-5.2).filter((_,i)=>i%3===0).slice(2,-2));
for(let i=1;i<=7;i++){
  const p=alleeCurve.getPointAt(i/9),t=alleeCurve.getTangentAt(i/9),l=Math.hypot(t.x,t.z)||1;
  tree(p.x-t.z/l*8,p.z+t.x/l*8,0.55+Math.random()*0.25);
  tree(p.x+t.z/l*8,p.z-t.x/l*8,0.55+Math.random()*0.25);
}
sprite('ALLÉE',240,96,5,'#4a4840');

/* portail : piliers pierre, boules dorées, vantaux fer forgé entrouverts, murets */
(function(){
  const gate=new THREE.Group();
  const stoneMat=new THREE.MeshStandardMaterial({color:'#ded6c2',roughness:.9});
  const capMat=new THREE.MeshStandardMaterial({color:'#b3a88d',roughness:.85});
  const ironMat=new THREE.MeshStandardMaterial({color:'#2b2823',roughness:.6,metalness:.4});
  const goldMat=new THREE.MeshStandardMaterial({color:'#c9a24b',roughness:.35,metalness:.7});
  [-4.2,4.2].forEach(px=>{
    const p=new THREE.Mesh(new THREE.BoxGeometry(1.3,3.1,1.3),stoneMat);p.position.set(px,1.55,0);p.castShadow=true;gate.add(p);
    const c=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.28,1.7),capMat);c.position.set(px,3.24,0);c.castShadow=true;gate.add(c);
    const f=new THREE.Mesh(new THREE.SphereGeometry(0.34,12,10),goldMat);f.position.set(px,3.7,0);f.castShadow=true;gate.add(f);
  });
  [-8.65,8.65].forEach(mx=>{
    const w=new THREE.Mesh(new THREE.BoxGeometry(7.6,1.05,0.5),stoneMat);w.position.set(mx,0.52,0);w.castShadow=true;w.receiveShadow=true;gate.add(w);
    const cp=new THREE.Mesh(new THREE.BoxGeometry(7.8,0.14,0.66),capMat);cp.position.set(mx,1.12,0);gate.add(cp);
  });
  [-12.7,12.7].forEach(px=>{
    const p=new THREE.Mesh(new THREE.BoxGeometry(0.95,1.7,0.95),stoneMat);p.position.set(px,0.85,0);p.castShadow=true;gate.add(p);
    const c=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.2,1.2),capMat);c.position.set(px,1.78,0);gate.add(c);
  });
  [-1,1].forEach(s=>{
    const leaf=new THREE.Group();
    for(let b=0;b<=7;b++){
      const lx=0.25+b*0.44,hb=1.9+0.5*(lx/3.3);
      const bar=new THREE.Mesh(new THREE.BoxGeometry(0.07,hb,0.07),ironMat);
      bar.position.set(-s*lx,hb/2,0);bar.castShadow=true;leaf.add(bar);
      if(b%2===0){const tip=new THREE.Mesh(new THREE.SphereGeometry(0.08,8,6),goldMat);tip.position.set(-s*lx,hb+0.05,0);leaf.add(tip);}
    }
    [0.35,1.35].forEach(h=>{const r=new THREE.Mesh(new THREE.BoxGeometry(3.4,0.09,0.06),ironMat);r.position.set(-s*1.75,h,0);r.castShadow=true;leaf.add(r);});
    leaf.position.set(s*3.55,0,0);leaf.rotation.y=s*0.55;
    gate.add(leaf);
  });
  const apron=new THREE.Mesh(new THREE.CircleGeometry(9,28),
    new THREE.MeshStandardMaterial({color:'#e8dfc8',roughness:1}));
  apron.rotation.x=-Math.PI/2;apron.position.y=0.12;apron.receiveShadow=true;gate.add(apron);
  const gd=Math.atan2(82-78,280-289);
  const[gx,gz]=M2(289,78);
  gate.position.set(gx,0,gz);gate.rotation.y=-(gd+Math.PI/2);
  scene.add(gate);
})();
sprite('PORTAIL',296,70,5,'#4a4840');

/* ---- piste au sud (existante) ---- */
ribbon([[0,262],[60,240],[130,227],[200,221],[280,222],[345,230]],5,'#d8cfba',0.04);
ribbon([[88,230],[100,223],[112,216]],4,'#d8cfba',0.05);

/* ---- haie existante entre paddocks et manège ---- */
box(1.5,2.5,60,'#5f7042',97,140,1.25);
[112,124,136,150,162].forEach(y=>tree(97,y,0.6));

/* ================= OBJETS ÉDITABLES ================= */
function lplane(g,w,l,color,y=0.05,cx=0,cz=0){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,l),new THREE.MeshStandardMaterial({color,roughness:1}));
  m.rotation.x=-Math.PI/2;m.position.set(cx,y,cz);m.receiveShadow=true;g.add(m);return m;
}
function lbox(g,w,h,l,color,cx=0,cz=0,cy=0){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,l),new THREE.MeshStandardMaterial({color,roughness:.9}));
  m.position.set(cx,cy+h/2,cz);m.castShadow=true;m.receiveShadow=true;g.add(m);return m;
}
function lrail(g,x1,z1,x2,z2){
  const dx=x2-x1,dz=z2-z1,len=Math.hypot(dx,dz),ang=Math.atan2(dz,dx);
  [0.6,1.1].forEach(h=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(len,0.09,0.09),railMat);
    m.position.set((x1+x2)/2,h,(z1+z2)/2);m.rotation.y=-ang;m.castShadow=true;g.add(m);});
}
function lsprite(g,text,h){
  const c=document.createElement('canvas');c.width=512;c.height=128;
  const x=c.getContext('2d');
  let fs=58;x.font='600 '+fs+'px "Barlow Condensed",sans-serif';
  while(x.measureText(text).width>470&&fs>28){fs-=4;x.font='600 '+fs+'px "Barlow Condensed",sans-serif';}
  x.textAlign='center';x.textBaseline='middle';
  x.lineWidth=8;x.strokeStyle='rgba(251,249,244,.9)';x.strokeText(text,256,64);
  x.fillStyle='#2b2a26';x.fillText(text,256,64);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),depthTest:false,transparent:true}));
  s.position.set(0,h,0);s.scale.set(26,6.5,1);g.add(s);
}
const DEFAULTS={
  manege:{x:131,y:133.5,w:66,l:25,rot:0,h:1},
  barn:{x:119,y:165,w:42,l:38,rot:0,h:1},
  carriere:{x:175,y:192,w:40,l:76,rot:0,h:1},
  marcheur:{x:126,y:196,w:20,l:20,rot:0,h:1},
  parking:{x:186.5,y:135.5,w:25,l:33,rot:0,h:1},
  padA:{x:58,y:137,w:20,l:50,rot:0,h:1},
  padB:{x:83,y:137,w:20,l:50,rot:0,h:1},
  shed1:{x:126,y:213.5,w:22,l:7,rot:0,h:1},
  shed2:{x:94,y:218,w:8,l:6,rot:0,h:1}
};
const NAMES={manege:'Manège',barn:'Écuries',carriere:'Carrière',marcheur:'Marcheur',parking:'Parking poids lourd',padA:'Paddocks — bloc 1',padB:'Paddocks — bloc 2',shed1:'Hangar existant',shed2:'Abri existant'};
function fManege(p){const g=new THREE.Group();
  const b=building(p.l,p.w,7*p.h,4*p.h,'#c9bfa9','#b0a690');b.rotation.y=Math.PI/2;g.add(b);
  lsprite(g,'MANÈGE',7*p.h+5);return g;}
function fBarn(p){const g=new THREE.Group();
  const wing=Math.max(4,Math.min(12,p.w/3,p.l/2.5)),bMat='#b3946a',bRoof='#7f6642';
  const n=building(wing,p.w,3.4*p.h,2.2*p.h,bMat,bRoof);n.rotation.y=Math.PI/2;n.position.z=-p.l/2+wing/2;g.add(n);
  const Lw=p.l-wing;
  [-1,1].forEach(s=>{
    const wg=building(wing,Lw,3.4*p.h,2.2*p.h,bMat,bRoof);
    wg.position.set(s*(p.w/2-wing/2),0,wing/2);g.add(wg);});
  const cw=p.w-2*wing;
  if(cw>2)lplane(g,cw,Lw,'#cfc7b5',0.05,0,wing/2);
  if(cw>10&&Lw>16)[[-3,-4],[3,-4],[-3,5],[3,5]].forEach((q,i)=>{
    lbox(g,2,1.4,4.2,['#31506e','#7a2f2f','#e8e4da','#556b4d'][i],q[0],wing/2+q[1],0);});
  lsprite(g,'ÉCURIES',3.4*p.h+5);return g;}
function fCarriere(p){const g=new THREE.Group();
  lplane(g,p.w,p.l,'#e3d2ab',0.08);
  const H='#59683d';
  lbox(g,2,1.7,p.l+4,H,-p.w/2-1,0);lbox(g,2,1.7,p.l+4,H,p.w/2+1,0);
  lbox(g,p.w+4,1.7,2,H,0,p.l/2+1);
  const segW=p.w/2-5;
  if(segW>1){lbox(g,segW,1.7,2,H,-(p.w/2-segW/2),-p.l/2-1);lbox(g,segW,1.7,2,H,p.w/2-segW/2,-p.l/2-1);}
  if(p.w>=20&&p.l>=30)[[-0.28,-0.29],[0.12,-0.11],[-0.25,0.11],[0.15,0.26]].forEach(f=>{
    const fx=f[0]*p.w,fz=f[1]*p.l;
    lbox(g,7,0.9,0.18,'#c65b34',fx,fz,0.45);
    lbox(g,0.3,1.2,0.3,'#efe7d6',fx-3.5,fz,0);lbox(g,0.3,1.2,0.3,'#efe7d6',fx+3.5,fz,0);});
  lsprite(g,'CARRIÈRE',5);return g;}
function fMarcheur(p){const g=new THREE.Group();const r=Math.max(3,p.w/2);
  const disc=new THREE.Mesh(new THREE.CircleGeometry(r,36),new THREE.MeshStandardMaterial({color:'#e0d0a8',roughness:1}));
  disc.rotation.x=-Math.PI/2;disc.position.y=0.08;disc.receiveShadow=true;g.add(disc);
  [r,Math.max(1.2,r*0.4)].forEach(rr=>{
    [0.6,1.1].forEach(h=>{const t=new THREE.Mesh(new THREE.TorusGeometry(rr,0.06,6,48),railMat);
      t.rotation.x=Math.PI/2;t.position.y=h;g.add(t);});
    for(let a=0;a<12;a++){const post=new THREE.Mesh(new THREE.BoxGeometry(0.14,1.3,0.14),railMat);
      post.position.set(rr*Math.cos(a/12*2*Math.PI),0.65,rr*Math.sin(a/12*2*Math.PI));post.castShadow=true;g.add(post);}});
  const grey=new THREE.MeshStandardMaterial({color:'#6f6f6f',roughness:.8});
  const mast=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,3.4*p.h,8),grey);
  mast.position.y=1.7*p.h;mast.castShadow=true;g.add(mast);
  const alen=r*0.62;
  for(let a=0;a<4;a++){const arm=new THREE.Mesh(new THREE.BoxGeometry(alen,0.12,0.3),grey);
    arm.position.set((alen/2+0.3)*Math.cos(a*Math.PI/2),3.1*p.h,(alen/2+0.3)*Math.sin(a*Math.PI/2));
    arm.rotation.y=-a*Math.PI/2;arm.castShadow=true;g.add(arm);}
  lsprite(g,'MARCHEUR (M)',6);return g;}
function fParking(p){const g=new THREE.Group();
  lplane(g,p.w,p.l,'#b5b5b5',0.05);
  const cols=['#5a5a5a','#6f6f6f','#4a4a4a','#606060'];
  for(let i=0;i<4;i++){const z=-p.l/2+8+i*10;if(z>p.l/2-4)break;lbox(g,7,3.4,2.4,cols[i],0,z,0);}
  lsprite(g,'PARKING POIDS LOURD',6);return g;}
function fPaddocks(p){const g=new THREE.Group();
  lplane(g,p.w,p.l,'#b7c584',0.05);
  lrail(g,-p.w/2,-p.l/2,p.w/2,-p.l/2);lrail(g,p.w/2,-p.l/2,p.w/2,p.l/2);
  lrail(g,p.w/2,p.l/2,-p.w/2,p.l/2);lrail(g,-p.w/2,p.l/2,-p.w/2,-p.l/2);
  for(let i=1;i<5;i++){const z=-p.l/2+p.l*i/5;lrail(g,-p.w/2,z,p.w/2,z);}
  lsprite(g,'5 PADDOCKS',6);return g;}
function fShed(p){const g=new THREE.Group();lbox(g,p.w,3.2*p.h,p.l,'#8a8378');return g;}
const FACTORIES={manege:fManege,barn:fBarn,carriere:fCarriere,marcheur:fMarcheur,parking:fParking,padA:fPaddocks,padB:fPaddocks,shed1:fShed,shed2:fShed};
function loadLayout(){
  const base=JSON.parse(JSON.stringify(DEFAULTS));
  try{const m=location.hash.match(/p=([A-Za-z0-9+/=]+)/);
    if(m){const o=JSON.parse(atob(m[1]));Object.keys(base).forEach(k=>{if(o[k])base[k]={...base[k],...o[k]};});return base;}}catch(e){}
  try{const s=localStorage.getItem('maquette14');
    if(s){const o=JSON.parse(s);Object.keys(base).forEach(k=>{if(o[k])base[k]={...base[k],...o[k]};});}}catch(e){}
  return base;
}
const LAYOUT=loadLayout();
function save(){try{localStorage.setItem('maquette14',JSON.stringify(LAYOUT));}catch(e){}}
const objs={};
let editMode=false,selected=null,dragKey=null,dragOff=[0,0];
function rebuild(key){
  if(objs[key])scene.remove(objs[key]);
  const p=LAYOUT[key],g=FACTORIES[key](p);
  if(editMode&&selected===key){
    const s=new THREE.Mesh(new THREE.PlaneGeometry(p.w+5,p.l+5),
      new THREE.MeshBasicMaterial({color:'#c98f2e',transparent:true,opacity:0.3,depthWrite:false}));
    s.rotation.x=-Math.PI/2;s.position.y=0.18;g.add(s);
  }
  const[gx,gz]=M2(p.x,p.y);
  g.position.set(gx,0,gz);g.rotation.y=-(p.rot||0)*Math.PI/180;
  scene.add(g);objs[key]=g;
}
Object.keys(FACTORIES).forEach(rebuild);
const ray=new THREE.Raycaster(),ndcV=new THREE.Vector2(),groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0),hitV=new THREE.Vector3();
function setRayFromEvent(e){
  const r=renderer.domElement.getBoundingClientRect();
  ndcV.set(((e.clientX-r.left)/r.width)*2-1,-((e.clientY-r.top)/r.height)*2+1);
  ray.setFromCamera(ndcV,camera);
}
function pick(e){
  setRayFromEvent(e);
  for(const k of Object.keys(objs)){if(ray.intersectObject(objs[k],true).length)return k;}
  return null;
}
function panelRefresh(){
  document.getElementById('editPanel').style.display=editMode?'block':'none';
  document.getElementById('epSel').style.display=(editMode&&selected)?'block':'none';
  document.getElementById('epNo').style.display=(editMode&&!selected)?'flex':'none';
  if(selected)document.getElementById('epName').textContent=NAMES[selected];
}
function select(k){
  const prev=selected;selected=k;
  if(prev&&objs[prev])rebuild(prev);
  if(k)rebuild(k);
  panelRefresh();
}
document.getElementById('edit').onclick=()=>{
  editMode=!editMode;
  document.getElementById('edit').textContent=editMode?'✓ Terminer':'✎ Éditer';
  if(!editMode)select(null);else panelRefresh();
};
document.querySelectorAll('#editPanel [data-a]').forEach(b=>b.addEventListener('click',()=>{
  const a=b.dataset.a;
  if(a==='x'){select(null);return;}
  if(!selected)return;
  const p=LAYOUT[selected],cl=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  if(a==='w-'||a==='w+'){p.w=cl(p.w+(a==='w+'?2:-2),4,140);if(selected==='marcheur')p.l=p.w;}
  if(a==='l-'||a==='l+'){p.l=cl(p.l+(a==='l+'?2:-2),4,140);if(selected==='marcheur')p.w=p.l;}
  if(a==='h-'||a==='h+'){p.h=Math.round(cl(p.h+(a==='h+'?0.1:-0.1),0.5,2.5)*100)/100;}
  if(a==='r+'){p.rot=((p.rot||0)+15)%360;}
  rebuild(selected);save();
}));
document.getElementById('epShare').addEventListener('click',async()=>{
  const url=location.origin+location.pathname+'#p='+btoa(JSON.stringify(LAYOUT));
  try{await navigator.clipboard.writeText(url);alert('Lien copié ! Il ouvre directement ta version modifiée.');}
  catch(e){prompt('Copie ce lien :',url);}
});
document.getElementById('epReset').addEventListener('click',()=>{
  if(!confirm('Revenir au plan d\'origine ?'))return;
  try{localStorage.removeItem('maquette14');}catch(e){}
  location.hash='';location.reload();
});

/* ---- arbres : grand bois au nord + lisière nord-est ---- */
for(let i=0;i<26;i++){tree(105+Math.random()*100,6+Math.random()*52,0.8+Math.random()*0.6);}
for(let i=0;i<12;i++){const t=i/13;tree(205+95*t+(Math.random()*8-4),56+38*t+(Math.random()*8-4),0.75+Math.random()*0.4);}
[[20,255],[150,233],[300,236],[50,100],[8,120],[310,140],[300,190]].forEach(p=>tree(p[0],p[1],0.7+Math.random()*0.3));

/* ---- caméra ---- */
const target=new THREE.Vector3(0,4,0);
/* caméra côté sud : gauche/droite identiques à la photo aérienne (nord en haut) */
let theta=-0.7,phi=0.95,radius=280;
const views={
  iso:{theta:-0.7,phi:0.95,radius:280,t:[0,4,0]},
  top:{theta:-0.0001,phi:0.02,radius:330,t:[0,4,0]},
  carr:{theta:-0.9,phi:0.85,radius:130,t:[35,3,52]}
};
function applyCam(){
  phi=Math.max(0.02,Math.min(1.45,phi));radius=Math.max(60,Math.min(650,radius));
  camera.position.set(target.x+radius*Math.sin(phi)*Math.sin(theta),
    target.y+radius*Math.cos(phi),target.z+radius*Math.sin(phi)*Math.cos(theta));
  camera.lookAt(target);
}
function panCam(dx,dy){const pan=radius*0.0016;
  const right=new THREE.Vector3(Math.cos(theta),0,-Math.sin(theta));
  const fwd=new THREE.Vector3(Math.sin(theta),0,Math.cos(theta));
  target.addScaledVector(right,-dx*pan);target.addScaledVector(fwd,dy*pan);}
const pointers=new Map();let pinchDist=0;
renderer.domElement.addEventListener('pointerdown',e=>{
  try{renderer.domElement.setPointerCapture(e.pointerId);}catch(_){}
  if(editMode&&e.button===0&&pointers.size===0&&dragKey===null){
    const k=pick(e);
    if(k){select(k);dragKey=k;
      dragOff=ray.ray.intersectPlane(groundPlane,hitV)?[LAYOUT[k].x-(hitV.x+CX),LAYOUT[k].y-(hitV.z+CY)]:[0,0];
      return;
    }
  }
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY,button:e.button});
  if(pointers.size===2){const p=[...pointers.values()];pinchDist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);}
});
function endPointer(e){
  if(dragKey){dragKey=null;save();}
  pointers.delete(e.pointerId);pinchDist=0;}
addEventListener('pointerup',endPointer);
addEventListener('pointercancel',endPointer);
addEventListener('pointermove',e=>{
  if(dragKey){
    setRayFromEvent(e);
    if(ray.ray.intersectPlane(groundPlane,hitV)){
      const p=LAYOUT[dragKey];
      p.x=Math.round((hitV.x+CX+dragOff[0])*2)/2;
      p.y=Math.round((hitV.z+CY+dragOff[1])*2)/2;
      const[gx,gz]=M2(p.x,p.y);
      objs[dragKey].position.set(gx,0,gz);
    }
    return;
  }
  const prev=pointers.get(e.pointerId);if(!prev)return;
  const dx=e.clientX-prev.x,dy=e.clientY-prev.y;
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY,button:prev.button});
  if(pointers.size===1){
    if(prev.button===2)panCam(dx,dy);
    else{theta-=dx*0.005;phi-=dy*0.005;}
  }else if(pointers.size===2){
    const p=[...pointers.values()];
    const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    if(pinchDist>0&&d>0)radius*=pinchDist/d;
    pinchDist=d;
    panCam(dx/2,dy/2);
  }
  applyCam();
});
renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();radius*=(1+Math.sign(e.deltaY)*0.08);applyCam();},{passive:false});
renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
function tween(v){const s={theta,phi,radius,tx:target.x,ty:target.y,tz:target.z},t0=performance.now();
  (function a(){const k=Math.min(1,(performance.now()-t0)/650),e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
   theta=s.theta+(v.theta-s.theta)*e;phi=s.phi+(v.phi-s.phi)*e;radius=s.radius+(v.radius-s.radius)*e;
   target.set(s.tx+(v.t[0]-s.tx)*e,s.ty+(v.t[1]-s.ty)*e,s.tz+(v.t[2]-s.tz)*e);
   applyCam();if(k<1)requestAnimationFrame(a);})();}
document.getElementById('reset').onclick=()=>tween(views.iso);
document.getElementById('top').onclick=()=>tween(views.top);
document.getElementById('carr').onclick=()=>tween(views.carr);

if(matchMedia('(pointer:coarse)').matches)
  document.getElementById('hintTxt').textContent='1 doigt : pivoter · pincer : zoomer · 2 doigts : déplacer';
const leg=document.getElementById('legend');
leg.querySelector('h2').addEventListener('click',()=>leg.classList.toggle('folded'));
if(matchMedia('(pointer:coarse)').matches||innerWidth<=640)leg.classList.add('folded');
function resize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
addEventListener('resize',resize);resize();applyCam();
(function loop(){requestAnimationFrame(loop);renderer.render(scene,camera);})();
</script>
</body>
